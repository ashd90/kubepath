apiVersion: apps/v1
kind: Deployment
metadata:
  name: my-deployment
spec:
  replicas: 3
  selector:
    matchLabels:
      app: my-app
  template:
    metadata:
      labels:
        app: my-app
    spec:
      containers:
        - name: my-container
          image: python:3.11-slim
          command: ["python3", "-c"]
          args:
            ["print('Hello from Kubernetes!'); import time; time.sleep(3600)"]
